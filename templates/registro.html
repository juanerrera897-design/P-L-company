<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - P&L company</title>
  <link rel="icon" href="../imagenes/reciclaje.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Quicksand', sans-serif;
      background: radial-gradient(circle at top left, #6c63ff 0%, transparent 28%),
                  radial-gradient(circle at bottom right, #2dd4bf 0%, transparent 30%),
                  linear-gradient(135deg, #07121e 0%, #11203b 45%, #0b1227 100%);
      color: #edf2ff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .page {
      width: 100%;
      max-width: 900px;
      position: relative;
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 28px;
      padding: 3rem 2.5rem 2.5rem;
      box-shadow: 0 35px 90px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(12px);
    }

    .page h1 {
      margin: 0 0 0.75rem;
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(2.5rem, 5vw, 4.2rem);
      letter-spacing: 0.16em;
      text-align: center;
      color: #ffffff;
    }

    .page p {
      margin: 1rem 0 1.5rem;
      line-height: 1.78;
      color: #d9e2ff;
      font-size: 1.05rem;
      text-align: justify;
    }

    .register-form {
      display: grid;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .register-form label {
      display: grid;
      gap: 0.5rem;
      color: #d9e2ff;
      font-weight: 500;
    }

    .register-form input {
      width: 100%;
      padding: 1rem 1.1rem;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.06);
      color: #f8fafc;
      font-size: 1rem;
    }

    .register-form input::placeholder {
      color: rgba(248, 250, 252, 0.6);
    }

    .button-group {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 1.5rem;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 1rem 1.8rem;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #7dd3fc 0%, #8b5cf6 100%);
      color: #0f172a;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 20px 45px rgba(125, 211, 252, 0.2);
      cursor: pointer;
    }

    .button:hover {
      transform: translateY(-3px);
      box-shadow: 0 26px 55px rgba(139, 92, 246, 0.28);
    }

    .button.secondary {
      background: rgba(255, 255, 255, 0.08);
      color: #d9e2ff;
      box-shadow: 0 20px 45px rgba(255, 255, 255, 0.08);
    }

    .error {
      padding: 1rem 1.1rem;
      border-radius: 16px;
      background: rgba(248, 113, 113, 0.18);
      border: 1px solid rgba(248, 113, 113, 0.35);
      color: #fee2e2;
      margin-top: 1rem;
      font-weight: 600;
    }

    .top-links {
      position: absolute;
      top: 1rem;
      right: 1rem;
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
    }

    .top-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.6rem 1rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.08);
      color: #f8fafc;
      text-decoration: none;
      font-size: 0.92rem;
      transition: transform 0.2s ease, background-color 0.2s ease;
    }

    .top-link:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.14);
    }

    .footer {
      margin-top: 2rem;
      text-align: center;
      color: #9ca3af;
      font-size: 0.95rem;
    }

    @media (max-width: 640px) {
      .page {
        padding: 2rem;
      }

      .button,
      .button.secondary {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="top-links">
      <a class="top-link" href="/">Volver a inicio</a>
      <a class="top-link" href="/aprende">Quiero aprender más</a>
    </div>
    <h1>Crear cuenta</h1>
    <p>Rellena los datos para poder acceder a nuestra plataforma.</p>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <form class="register-form" action="/registro" method="POST">
      <label>
        Correo electrónico
        <input type="email" name="email" placeholder="tuemail@ejemplo.com" required>
      </label>
      <label>
        Nombre completo
        <input type="text" name="name" placeholder="Tu nombre" required>
      </label>
      <label>
        P&L ID único en el mundo
        <input type="text" name="pl_id" placeholder="TuP&Lid123" required>
      </label>
      <label>
        Contraseña
        <input type="password" name="password" placeholder="Tu contraseña" required>
      </label>
      <button class="button" type="submit">Registrar</button>
    </form>
    <div class="button-group">
      <a class="button secondary" href="/login">Ya tengo cuenta</a>
    </div>
    <p class="footer">Después de registrarte podrás iniciar sesión con tu correo y contraseña.</p>
  </main>
</body>
</html>
